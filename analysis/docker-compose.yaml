services:
  # Unpause database
  db_warmup:
    image: python:3.11-slim
    networks:
      - app-net
    environment:
      - MSSQL_SERVER=${MSSQL_SERVER}
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PASSWORD=${MSSQL_PASSWORD}
      - MSSQL_DATABASE=${MSSQL_DATABASE}
    volumes:
      - ./db_warmup.py:/db_warmup.py:ro
    command: sh -c "pip install --no-cache-dir pymssql && python /db_warmup.py"
    restart: "no"

  # SQL Server
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    platform: linux/amd64
    # automate setup
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_PASSWORD}
    networks:
      - app-net
    ports:
      - "${HOST_SQL_PORT:-1434}:1433"
    # continuously verifies healthy status of service
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # MCP Server
  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    # # waits until mssql is healthy before starting
    # depends_on:
    #   mssql:
    #     condition: service_healthy
    environment:
      - MSSQL_SERVER=${MSSQL_SERVER}
      - MSSQL_PORT=${MSSQL_PORT}
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PASSWORD=${MSSQL_PASSWORD}
      - MSSQL_DATABASE=${MSSQL_DATABASE}
    networks:
      - app-net
    # publish MCPO port for visibility
    ports:
      - "8000:8000"
    # MCP expects to interface with stdin, requires permission
    stdin_open: true
    tty: true
    # ensures database is reachable and not paused
    depends_on:
      db_warmup:
        condition: service_completed_successfully

  # AI stack — CPU variant
  ollama-cpu:
    image: ollama/ollama:latest
    # ensures mutual exclusion with NVIDIA setup
    profiles: ["cpu"]
    container_name: ollama
    hostname: ollama
    # Ollama API port
    ports:
      - "11434:11434"
    networks:
      - app-net
    # persistence of downloaded models
    volumes:
      - ./ollama-local:/root/.ollama

  openWebUI-cpu:
    image: ghcr.io/open-webui/open-webui:main
    # ensures mutual exclusion with NVIDIA setup
    profiles: ["cpu"]
    container_name: openwebui
    hostname: openwebui
    # localhost port
    ports:
      - "3000:8080"
    networks:
      - app-net
    restart: unless-stopped
    volumes:
      - ./open-webui-local:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      ENABLE_PERSISTENT_CONFIG: "false"
      TOOL_SERVER_CONNECTIONS: >
        [{"url":"http://mcp_server:8000","path":"openapi.json","auth_type":"bearer","key":"top-secret","config":{"enable":true,"access_control":null},"info":{"name":"mssql_mcp_server","description":"MSSQL via mcpo proxy"}}]
      MODEL_DEFAULT_PARAMS: '{"system":"You are a database analyst with read access to an Azure SQL database called plane-db containing two tables: learning_data and hyperparameters. Use the execute_sql tool for all data retrieval — never fabricate table names, columns, or data. Report raw query results faithfully. If a query fails, read the error and try again. If you haven''t queried it, you don''t know it."}'
    depends_on:
      - ollama-cpu

  # AI stack — NVIDIA GPU variant
  ollama-nvidia:
    image: ollama/ollama:latest
    # ensures mutual exclusion with cpu setup
    profiles: ["nvidia"]
    container_name: ollama
    hostname: ollama
    # Ollama API port
    ports:
      - "11434:11434"
    # NVIDIA stack setup
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              count: all
    networks:
      - app-net
    # persistence of downloaded models
    volumes:
      - ./ollama-local:/root/.ollama

  openWebUI-nvidia:
    image: ghcr.io/open-webui/open-webui:main
     # ensures mutual exclusion with cpu setup
    profiles: ["nvidia"]
    container_name: openwebui
    hostname: openwebui
    # localhost port
    ports:
      - "3000:8080"
    networks:
      - app-net
    restart: unless-stopped
    volumes:
      - ./open-webui-local:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      ENABLE_PERSISTENT_CONFIG: "false"
      TOOL_SERVER_CONNECTIONS: >
        [{"url":"http://mcp_server:8000","path":"openapi.json","auth_type":"bearer","key":"top-secret","config":{"enable":true,"access_control":null},"info":{"name":"mssql_mcp_server","description":"MSSQL via mcpo proxy"}}]
    depends_on:
      - ollama-nvidia

# Allows all services to be reachable by one another
networks:
  app-net:
    driver: bridge